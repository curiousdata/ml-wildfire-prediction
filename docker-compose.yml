# Local build of the Fire Guard monitor (docker/monolith/app_live.py) — reads the latest prediction from
# data/serving_store/ and the FGDC gold cube, both reached through the read-only repo mount. The engine
# (scripts/serve.py --mode live) runs on the host, not in this container.
# (Rewritten 2026-07-07: the previous compose launched the deleted v1 U-Net app.py against the deleted
# IberFire_coarse32 cube / resnet34_v9.pth — dead config since the 2026-06 v1 removal.)
services:
  monolith:
    build:
      context: .
      dockerfile: docker/monolith/Dockerfile
    ports:
      - "8501:8501"
    restart: unless-stopped
    environment:
      # Streamlit stability in containers
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - STREAMLIT_SERVER_HEADLESS=true
      - HOME=/tmp
      - XDG_CONFIG_HOME=/tmp
      - XDG_CACHE_HOME=/tmp
      # Make repo code importable (app_live inserts the repo root itself; kept for safety)
      - PYTHONPATH=/workspace
    volumes:
      # One read-only repo mount: app_live resolves data/serving_store + data/gold/FireGuard_coarse4.zarr
      # relative to its own path (/workspace)
      - ./:/workspace:ro
    command: streamlit run /workspace/docker/monolith/app_live.py --server.port=8501 --server.address=0.0.0.0
